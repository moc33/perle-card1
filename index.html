<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perle Card Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#9333ea);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
border-radius:20px;
padding:40px;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
max-width:620px;
width:100%;
}

h1{
text-align:center;
margin-bottom:30px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:40px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #e4e4e4;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.card-preview{
margin-top:30px;
display:none;
}

.card-preview.show{
display:block;
}

.card-wrapper{
position:relative;
display:flex;
justify-content:center;
}

/* Responsive card scaling */

@media(max-width:768px){
.card-wrapper{
transform:scale(.9);
transform-origin:top center;
}
}

@media(max-width:480px){
.card-wrapper{
transform:scale(.75);
transform-origin:top center;
margin-bottom:-50px;
}
}

/* Card */

.perle-card{
position:relative;
display:inline-block;
}

.card-base{
display:block;
max-width:100%;
height:auto;
}

/* Avatar */

.avatar{
position:absolute;
left:7%;
top:28%;
width:27%;
height:45%;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
}

.avatar img{
max-width:110%;
max-height:110%;
object-fit:contain;
}

/* Username */

.username{
position:absolute;
left:40%;
top:50.5%;
font-weight:bold;
color:#333;
font-size:2.8vw;
max-width:52%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

@media(min-width:1200px){
.username{
font-size:32px;
}
}

/* Barcode */

.barcode{
position:absolute;
left:40%;
top:68%;
font-family:"Courier New",monospace;
font-size:1.6vw;
color:#666;
}

@media(min-width:1200px){
.barcode{
font-size:18px;
}
}

.download{
margin-top:20px;
background:linear-gradient(135deg,#10b981,#34d399);
}

</style>
</head>

<body>

<div class="container">

<h1>
<img src="perle-logo.png" class="logo">
Perle Card Generator
</h1>

<input id="username" placeholder="Enter X username">

<button onclick="generateCard()">Generate Card</button>

<div class="card-preview" id="preview">

<div class="card-wrapper">

<div class="perle-card" id="capture">

<img src="perle-card-template.png" class="card-base">

<div class="avatar">
<img id="avatar" crossorigin="anonymous">
</div>

<div class="username" id="name"></div>

<div class="barcode" id="barcode"></div>

</div>

</div>

<button class="download" onclick="downloadCard()">Download Card</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* Generate barcode number */

function generateNumber(username){

let hash=0

for(let i=0;i<username.length;i++){
hash=((hash<<5)-hash)+username.charCodeAt(i)
hash|=0
}

let num=Math.abs(hash).toString().padStart(12,"0")

return num.slice(0,4)+"-"+num.slice(4,8)+"-"+num.slice(8,12)

}

/* Format username */

function formatUsername(username){

if(username.length>6){
return "@"+username.slice(0,6)+"..."
}

return "@"+username

}

/* Load avatar safely */

function loadAvatar(username){

return new Promise((resolve)=>{

const img=document.getElementById("avatar")

img.crossOrigin="anonymous"

img.onload=()=>resolve()

img.onerror=function(){

img.src=`https://ui-avatars.com/api/?name=${username}&size=256&background=random`
img.onload=()=>resolve()

}

img.src=`https://unavatar.io/twitter/${username}`

})

}

/* Generate card */

async function generateCard(){

let username=document.getElementById("username").value.trim()

if(!username) return

username=username.replace("@","")

document.getElementById("name").innerText=formatUsername(username)

document.getElementById("barcode").innerText=generateNumber(username)

await loadAvatar(username)

document.getElementById("preview").classList.add("show")

}

/* Download card */

async function downloadCard(){

const card=document.getElementById("capture")

const canvas=await html2canvas(card,{
scale:4,
useCORS:true,
allowTaint:true,
backgroundColor:null
})

const link=document.createElement("a")

link.download="perle-card.png"

link.href=canvas.toDataURL("image/png")

link.click()

}

</script>

</body>
</html>
