<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perle Card Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#9333ea);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
border-radius:18px;
padding:40px;
max-width:620px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:30px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:40px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #e4e4e4;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
font-weight:bold;
cursor:pointer;
}

.card-preview{
margin-top:30px;
display:none;
text-align:center;
}

.perle-card{
position:relative;
display:inline-block;
}

.card-base{
width:100%;
max-width:520px;
display:block;
}

/* avatar */

.profile-pic{
position:absolute;
left:7%;
top:28%;
width:29%;
height:46%;
display:flex;
align-items:center;
justify-content:center;
}

.profile-pic img{
width:100%;
height:100%;
object-fit:cover;
}

/* username FIX */

.username{
position:absolute;
left:40%;
top:51%;
font-size:32px;
font-weight:bold;
color:#333;
max-width:50%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* barcode FIX */

.barcode{
position:absolute;
left:40%;
top:68%;
font-size:18px;
font-family:"Courier New",monospace;
letter-spacing:2px;
color:#666;
}

.download{
margin-top:20px;
background:linear-gradient(135deg,#10b981,#34d399);
}

</style>
</head>

<body>

<div class="container">

<h1>
<img src="perle-logo.png" class="logo">
Perle Card Generator
</h1>

<input id="username" placeholder="Enter username">

<button onclick="generateCard()">Generate Card</button>

<div class="card-preview" id="preview">

<div class="perle-card" id="capture">

<img src="perle-card-template.png" class="card-base">

<div class="profile-pic">
<img id="avatar">
</div>

<div class="username" id="name"></div>

<div class="barcode" id="barcode"></div>

</div>

<button class="download" onclick="downloadCard()">Download Card</button>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* barcode generator */

function generateNumber(username){

let hash=0;

for(let i=0;i<username.length;i++){
hash=((hash<<5)-hash)+username.charCodeAt(i);
hash|=0;
}

let num=Math.abs(hash).toString().padStart(12,"0");

return num.slice(0,4)+"-"+num.slice(4,8)+"-"+num.slice(8,12);

}

/* username shrink logic */

function formatUsername(name){

if(name.length>12){
return "@"+name.substring(0,10)+"...";
}

return "@"+name;

}

/* dynamic font scaling */

function adjustFont(name){

const el=document.getElementById("name");

if(name.length>10){
el.style.fontSize="26px";
}
else if(name.length>7){
el.style.fontSize="28px";
}
else{
el.style.fontSize="32px";
}

}

async function generateCard(){

const username=document.getElementById("username").value.trim().replace("@","");

if(!username) return;

document.getElementById("name").innerText=formatUsername(username);

adjustFont(username);

document.getElementById("barcode").innerText=generateNumber(username);

document.getElementById("avatar").src=`https://unavatar.io/x/${username}`;

document.getElementById("preview").style.display="block";

}

async function downloadCard(){

const card=document.getElementById("capture");

const canvas=await html2canvas(card,{
scale:3,
useCORS:true
});

const link=document.createElement("a");

link.download="perle-card.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
