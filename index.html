<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perle Card Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#4f46e5,#9333ea);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
border-radius:18px;
padding:40px;
max-width:620px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:30px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
color:#222;
}

.logo{
width:40px;
height:40px;
object-fit:contain;
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
color:#555;
}

input{
width:100%;
padding:12px;
border:2px solid #e4e4e4;
border-radius:8px;
font-size:16px;
}

input:focus{
outline:none;
border-color:#6366f1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

button:hover{
transform:translateY(-1px);
}

.loading{
text-align:center;
margin-top:12px;
display:none;
color:#6366f1;
}

.error{
text-align:center;
margin-top:12px;
display:none;
color:#ef4444;
}

.card-preview{
margin-top:30px;
display:none;
text-align:center;
}

.perle-card-wrapper{
display:flex;
justify-content:center;
}

.perle-card{
position:relative;
display:inline-block;
max-width:100%;
}

.card-base{
width:100%;
display:block;
}

.profile-pic{
position:absolute;
left:7%;
top:28%;
width:29%;
height:46%;
display:flex;
align-items:center;
justify-content:center;
}

.profile-pic img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

.username{
position:absolute;
left:40%;
top:50%;
font-size:2.7vw;
font-weight:bold;
color:#333;
max-width:50%;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.barcode{
position:absolute;
left:40%;
top:67%;
font-size:1.6vw;
font-family:monospace;
color:#666;
}

.download{
margin-top:20px;
background:linear-gradient(135deg,#10b981,#34d399);
}

canvas{
display:none;
}

@media(max-width:768px){

.container{
padding:20px;
}

.username{
font-size:4vw;
}

.barcode{
font-size:3vw;
}

}

</style>
</head>

<body>

<div class="container">

<h1>
<img src="perle-logo.png" class="logo">
Perle Card Generator
</h1>

<div class="input-group">
<label>X Username</label>
<input id="username" placeholder="enter username (without @)">
</div>

<button onclick="generateCard()">Generate Card</button>

<div class="loading" id="loading">Loading profile...</div>
<div class="error" id="error">Could not fetch profile image.</div>

<div class="card-preview" id="preview">

<div class="perle-card-wrapper">

<div class="perle-card" id="capture">

<img src="perle-card-template.png" class="card-base">

<div class="profile-pic">
<img id="avatar" crossorigin="anonymous">
</div>

<div class="username" id="name"></div>

<div class="barcode" id="barcode"></div>

</div>

</div>

<button class="download" onclick="downloadCard()">Download Card</button>

</div>

</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

function generateNumber(username){

let hash=0;

for(let i=0;i<username.length;i++){
hash=((hash<<5)-hash)+username.charCodeAt(i);
hash|=0;
}

let num=Math.abs(hash).toString().padStart(12,"0");

return num.slice(0,4)+"-"+num.slice(4,8)+"-"+num.slice(8,12);

}


function shortenName(name){

if(name.length>6){
return "@"+name.substring(0,6)+"...";
}

return "@"+name;

}


async function generateCard(){

const input=document.getElementById("username").value.trim();

const username=input.replace("@","");

const loading=document.getElementById("loading");

const error=document.getElementById("error");

const preview=document.getElementById("preview");

if(!username){

error.innerText="Enter username";
error.style.display="block";
return;

}

loading.style.display="block";
error.style.display="none";
preview.style.display="none";

const sources=[

`https://unavatar.io/x/${username}`,
`https://avatar.vercel.sh/${username}`,
`https://ui-avatars.com/api/?name=${username}&size=200`

];

let loaded=false;

for(let url of sources){

if(loaded) break;

try{

const img=new Image();

img.crossOrigin="anonymous";

await new Promise((resolve,reject)=>{

img.onload=()=>resolve();
img.onerror=reject;
img.src=url;

});

document.getElementById("avatar").src=url;

loaded=true;

}catch(e){}

}

if(!loaded){

document.getElementById("avatar").src=
`https://ui-avatars.com/api/?name=${username}&size=200`;

}

document.getElementById("name").innerText=shortenName(username);

document.getElementById("barcode").innerText=generateNumber(username);

loading.style.display="none";
preview.style.display="block";

}


async function downloadCard(){

const card=document.getElementById("capture");

const canvas=await html2canvas(card,{
scale:3,
useCORS:true,
backgroundColor:null
});

const url=canvas.toDataURL("image/png");

const a=document.createElement("a");

a.href=url;

a.download="perle-card.png";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

}


document.getElementById("username").addEventListener("keypress",e=>{
if(e.key==="Enter") generateCard();
});

</script>

</body>
</html>
