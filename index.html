<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Perle Card Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4f46e5,#9333ea);
padding:20px;
}

.container{
background:white;
border-radius:18px;
padding:35px;
max-width:500px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.2);
text-align:center;
}

h1{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin-bottom:25px;
}

.logo{
width:28px;
}

label{
display:block;
text-align:left;
font-weight:600;
margin-bottom:6px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #e5e5e5;
margin-bottom:15px;
font-size:15px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#6366f1,#9333ea);
margin-bottom:20px;
}

button:hover{
opacity:.9;
}

.preview{
display:none;
margin-top:20px;
}

.card-wrapper{
display:flex;
justify-content:center;
}

.card{
position:relative;
width:100%;
max-width:420px;
}

.card img.base{
width:100%;
display:block;
}

.avatar{
position:absolute;
left:7%;
top:28%;
width:28%;
height:46%;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.username{
position:absolute;
left:40%;
top:52%;
font-weight:bold;
font-size:26px;
}

.barcode{
position:absolute;
left:40%;
top:67%;
font-family:monospace;
font-size:16px;
}

.download{
background:linear-gradient(90deg,#10b981,#34d399);
margin-top:15px;
}

@media(max-width:600px){

.container{
padding:20px;
}

.username{
font-size:20px;
}

.barcode{
font-size:14px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>
<img src="perle-logo.png" class="logo">
Perle Card Generator
</h1>

<label>X Username</label>

<input id="username" placeholder="enter username (without @)">

<button onclick="generateCard()">Generate Card</button>

<div class="preview" id="preview">

<div class="card-wrapper">

<div class="card" id="card">

<img src="perle-card-template.png" class="base">

<div class="avatar">
<img id="avatar">
</div>

<div class="username" id="name"></div>

<div class="barcode" id="barcode"></div>

</div>

</div>

<button class="download" onclick="downloadCard()">Download Card</button>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

function generateNumber(username){

let hash=0;

for(let i=0;i<username.length;i++){

hash=((hash<<5)-hash)+username.charCodeAt(i);
hash|=0;

}

let num=Math.abs(hash).toString().padStart(12,"0");

return num.slice(0,4)+"-"+num.slice(4,8)+"-"+num.slice(8,12);

}

function generateCard(){

const input=document.getElementById("username").value.trim().replace("@","");

if(!input) return;

document.getElementById("name").innerText="@"+input;

document.getElementById("barcode").innerText=generateNumber(input);

document.getElementById("avatar").src=`https://unavatar.io/x/${input}`;

document.getElementById("preview").style.display="block";

}

async function downloadCard(){

const card=document.getElementById("card");

const canvas=await html2canvas(card,{scale:3,useCORS:true});

const link=document.createElement("a");

link.download="perle-card.png";

link.href=canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
