<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perle Card Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#9333ea);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.container{
background:white;
border-radius:18px;
padding:40px;
max-width:620px;
width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.25);
}

h1{
text-align:center;
margin-bottom:30px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.logo{
width:40px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:2px solid #e4e4e4;
margin-bottom:20px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.card-preview{
margin-top:30px;
display:none;
text-align:center;
}

.perle-card{
position:relative;
width:520px;
height:auto;
display:inline-block;
}

/* template */

.card-base{
width:520px;
display:block;
}

/* profile */

.profile-pic{
position:absolute;
left:6.5%;
top:29%;
width:26%;
height:44%;
overflow:hidden;
}

.profile-pic img{
width:100%;
height:100%;
object-fit:cover;
}

/* username */

.username{
position:absolute;
left:40%;
top:52%;
width:48%;
font-weight:bold;
color:#333;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

/* barcode */

.barcode{
position:absolute;
left:40%;
top:69%;
width:48%;
font-size:18px;
font-family:"Courier New",monospace;
letter-spacing:2px;
color:#666;
}

/* download */

.download{
margin-top:20px;
background:linear-gradient(135deg,#10b981,#34d399);
}

</style>
</head>

<body>

<div class="container">

<h1>
<img src="perle-logo.png" class="logo">
Perle Card Generator
</h1>

<input id="username" placeholder="Enter Twitter Username">

<button onclick="generateCard()">Generate Card</button>

<div class="card-preview" id="preview">

<div class="perle-card" id="capture">

<img src="perle-card-template.png" class="card-base">

<div class="profile-pic">
<img id="avatar">
</div>

<div class="username" id="name"></div>

<div class="barcode" id="barcode"></div>

</div>

<button class="download" onclick="downloadCard()">Download Card</button>

</div>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>

/* ---------- barcode generator ---------- */

function generateBarcode(username){

let hash = 0;

for(let i=0;i<username.length;i++){

hash = username.charCodeAt(i) + ((hash << 5) - hash);

}

let num = Math.abs(hash).toString().padStart(12,"0");

return num.slice(0,4)+"-"+num.slice(4,8)+"-"+num.slice(8,12);

}


/* ---------- username formatter ---------- */

function formatUsername(name){

name = name.replace("@","");

if(name.length > 13){

return "@"+name.substring(0,10)+"...";

}

return "@"+name;

}


/* ---------- font scaling ---------- */

function adjustFont(name){

const el = document.getElementById("name");

if(name.length > 12){

el.style.fontSize = "24px";

}

else if(name.length > 9){

el.style.fontSize = "26px";

}

else if(name.length > 6){

el.style.fontSize = "28px";

}

else{

el.style.fontSize = "32px";

}

}


/* ---------- generate card ---------- */

function generateCard(){

let username = document.getElementById("username").value.trim();

if(!username) return;

username = username.replace("@","");

/* username */

const formatted = formatUsername(username);

document.getElementById("name").innerText = formatted;

adjustFont(username);

/* barcode */

document.getElementById("barcode").innerText = generateBarcode(username);

/* avatar */

document.getElementById("avatar").src = `https://unavatar.io/x/${username}`;

/* show preview */

document.getElementById("preview").style.display = "block";

}


/* ---------- download ---------- */

async function downloadCard(){

const card = document.getElementById("capture");

const canvas = await html2canvas(card,{
scale:3,
useCORS:true
});

const link = document.createElement("a");

link.download = "perle-card.png";

link.href = canvas.toDataURL();

link.click();

}

</script>

</body>
</html>
